appId: com.cloud.ops-manager
productName: Cloud Ops Manager
copyright: Copyright 2026

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*

extraResources:
  - from: resources/icon-mac.png
    to: icon-mac.png

asar: true

# ws 的 bufferutil/utf-8-validate 为可选性能依赖，已移除；打包时跳过 native rebuild 避免交叉编译需 Xcode CLT
npmRebuild: false
nodeGypRebuild: false

publish:
  provider: github
  owner: S0x007
  repo: cloud-ops-manager
  releaseType: release

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  icon: resources/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false

win:
  target:
    - target: nsis
      arch: [x64, arm64]
  # 与 macOS 同源：resources/icon-mac.png → icon-win.ico
  icon: resources/icon-win.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Cloud Ops Manager

linux:
  target:
    - target: AppImage
      arch: [x64, arm64]
  icon: resources/icon.png
  category: Development
  maintainer: "xize"
